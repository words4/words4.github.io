{{ define "main" }}
  <section class="list-page">
    <h1>{{ .Title }}</h1>

    {{ if .Content }}
      <div class="section-content">
        {{ .Content }}
      </div>
    {{ end }}

    <ul>
      {{ range .Pages }}
        <li>
          <a href="{{ .RelPermalink }}">{{ .Title }}</a>
        </li>
      {{ end }}
    </ul>
  </section>
{{ end }}
