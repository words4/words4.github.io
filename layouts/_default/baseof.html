<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>
    {{ block "title" . }}
      {{ if .IsHome }}
        {{ .Site.Title }}
      {{ else }}
        {{ .Title }} - {{ .Site.Title }}
      {{ end }}
    {{ end }}
  </title>
  {{ partial "head.html" . }}
</head>
<body>

  {{ partial "topbar.html" . }}

  <main id="content">
    {{ block "main" . }}{{ end }}
  </main>

  {{ partial "footer.html" . }}

</body>
</html>
